# docker-compose.yml
name: movie-ticket-booking-system

services:
  postgres:
    image: postgres:16-alpine
    container_name: movie-ticket-booking-system-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Bangkok
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: movie-ticket-booking-system-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: