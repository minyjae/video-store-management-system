<nav class="sticky top-0 z-50 bg-black/95 backdrop-blur-md border-b border-white/10 h-14 md:h-16 flex items-center px-4 md:px-8">
  <div class="flex items-center justify-between w-full">

    <!-- Logo + Nav links -->
    <div class="flex items-center gap-6 md:gap-10">
      <span (click)="goHome()" class="text-red-500 font-black text-lg md:text-xl tracking-widest cursor-pointer">CINEBOOK</span>
      <!-- Nav links: ซ่อนบน mobile -->
      <div class="hidden md:flex gap-6 text-sm">
        <a class="text-gray-300 hover:text-white transition-colors cursor-pointer">หนัง</a>
        <a class="text-gray-300 hover:text-white transition-colors cursor-pointer">โรงภาพยนตร์</a>
        <a class="text-gray-300 hover:text-white transition-colors cursor-pointer">โปรโมชั่น</a>
      </div>
    </div>

    <!-- Auth -->
    <div class="flex items-center gap-2 md:gap-3">
      @if (auth.isLoggedIn()) {
        <!-- Logged in: show username + logout -->
        <span class="hidden md:flex items-center gap-2 text-sm text-gray-300">
          <span class="w-7 h-7 rounded-full bg-red-600 flex items-center justify-center text-white text-xs font-bold">
            {{ auth.username().charAt(0).toUpperCase() }}
          </span>
          {{ auth.username() }}
        </span>
        <button
          (click)="logout()"
          class="text-xs md:text-sm text-gray-400 hover:text-white transition-colors px-3 py-1.5 border border-white/10 hover:border-white/30 rounded-full cursor-pointer"
        >
          ออกจากระบบ
        </button>
      } @else {
        <!-- Not logged in: show login + register -->
        <a routerLink="/login" class="hidden md:block text-sm text-gray-300 hover:text-white transition-colors px-3 py-1.5 cursor-pointer">
          เข้าสู่ระบบ
        </a>
        <a routerLink="/register" class="text-xs md:text-sm bg-red-600 hover:bg-red-500 transition-colors text-white px-4 md:px-5 py-1.5 rounded-full font-medium cursor-pointer">
          สมัครสมาชิก
        </a>
      }
    </div>

  </div>
</nav>
