<app-banner></app-banner>

<div class="px-4 md:px-8 py-6 md:py-8">

  <!-- Section header -->
  <div class="flex items-center gap-3 mb-4 md:mb-6">
    <div class="w-1 h-5 bg-red-500 rounded-full"></div>
    <h2 class="text-white text-base md:text-lg font-bold tracking-wide">กำลังฉาย</h2>
  </div>

  <!-- Movie strip -->
  <div
    #movieStrip
    class="overflow-x-auto scrollbar-hide cursor-grab select-none"
    (mousedown)="onMouseDown($event)"
    (mousemove)="onMouseMove($event)"
    (mouseup)="onDragEnd()"
    (mouseleave)="onDragEnd()"
  >
    <div class="flex gap-3 md:gap-5">

      <!-- Skeleton loading -->
      @if (movies().length === 0) {
        @for (i of [1,2,3,4,5]; track i) {
          <div class="flex-none w-40 md:w-52">
            <div class="w-40 h-60 md:w-52 md:h-78 bg-white/5 rounded-xl animate-pulse"></div>
            <div class="mt-2 h-3 bg-white/5 rounded animate-pulse w-3/4"></div>
            <div class="mt-1.5 h-2.5 bg-white/5 rounded animate-pulse w-1/3"></div>
          </div>
        }
      }

      <!-- Movie cards -->
      @for (movie of movies(); track movie.id) {
        <div class="flex-none w-40 md:w-52 group" (click)="onMovieClick(movie.id)">

          <div class="relative overflow-hidden rounded-xl cursor-pointer">
            <img
              [src]="'https://picsum.photos/seed/' + movie.id + '/208/312'"
              [alt]="movie.title"
              draggable="false"
              class="w-full h-60 md:h-78 object-cover transition-transform duration-500 group-hover:scale-110 pointer-events-none"
            />

            <!-- Hover overlay -->
            <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end justify-center pb-4 md:pb-5">
              <span class="bg-red-600 text-white text-xs font-semibold px-4 md:px-5 py-1.5 md:py-2 rounded-full">
                จองตั๋ว
              </span>
            </div>

            <!-- Category badge -->
            <span class="absolute top-2 left-2 bg-black/70 backdrop-blur-sm text-white text-[10px] px-2 py-0.5 rounded-md">
              {{ movie.category }}
            </span>
          </div>

          <p class="text-white mt-2 text-xs md:text-sm font-medium truncate">{{ movie.title }}</p>
          <p class="text-gray-500 text-[10px] md:text-xs mt-0.5">{{ movie.price }} ฿</p>
        </div>
      }

    </div>
  </div>

</div>

<app-footer></app-footer>
