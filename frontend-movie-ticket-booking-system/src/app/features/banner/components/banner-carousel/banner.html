@if (banners().length > 0) {
  <div
    class="relative w-full overflow-hidden select-none cursor-grab h-55 md:h-110"
    (mousedown)="onMouseDown($event)"
    (mouseup)="onMouseUp($event)"
    (mouseleave)="onMouseLeave()"
  >
    <!-- slide strip: total width = N * 100%, translate by index * slideWidth% -->
    <div
      class="flex h-full transition-transform duration-500 ease-in-out"
      [style.width]="stripWidth() + '%'"
      [style.transform]="'translateX(' + (-currentIndex() * slideWidth()) + '%)'"
    >
      @for (banner of banners(); track banner.id) {
        <div class="relative h-full flex-none" [style.width]="slideWidth() + '%'">
          <img
            [src]="'http://localhost:5074' + banner.imageUrl"
            [alt]="banner.title"
            draggable="false"
            class="w-full h-full object-cover pointer-events-none"
          />
          <!-- per-slide gradient -->
          <div class="absolute inset-0 bg-linear-to-r from-black/70 via-black/30 to-transparent pointer-events-none"></div>
          <div class="absolute inset-0 bg-linear-to-t from-[#0f0f0f] via-transparent to-transparent pointer-events-none"></div>

          <!-- text overlay -->
          <div class="absolute bottom-12 md:bottom-16 left-6 md:left-16 max-w-xs md:max-w-lg pointer-events-none">
            <span class="inline-block text-xs bg-red-600 text-white px-2.5 py-0.5 rounded-full font-semibold mb-3">
              {{ banner.genre }}
            </span>
            <h2 class="text-white font-black text-xl md:text-4xl leading-tight drop-shadow-lg">
              {{ banner.title }}
            </h2>
            <p class="text-gray-300 text-xs md:text-sm mt-2 leading-relaxed line-clamp-2">
              {{ banner.tagline }}
            </p>
          </div>
        </div>
      }
    </div>

    <!-- dot navigation -->
    <div class="absolute bottom-3 md:bottom-5 left-1/2 -translate-x-1/2 flex gap-2">
      @for (banner of banners(); track banner.id; let i = $index) {
        <button
          (click)="goTo(i)"
          class="h-1.5 rounded-full transition-all duration-300"
          [ngClass]="i === currentIndex() ? 'bg-white w-6' : 'bg-white/40 w-2.5'"
        ></button>
      }
    </div>
  </div>
}
